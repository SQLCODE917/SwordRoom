work_units:
  - id: idm-01-make_auth_configuration_fail_closed_and_provider_neutral
    goal: remove_fail_open_auth_behavior_and_keycloak_specific_runtime_assumptions
    delivers:
      - deliverable-01-auth_contract_and_fail_closed_config
    prerequisites: []
    implementation_requirements:
      - AUTH_MODE_must_be_explicit_and_startup_must_fail_when_it_is_missing
      - dev_auth_must_require_explicit_local_only_opt_in_and_must_never_activate_in_aws_runtime
      - API_auth_configuration_must_use_OIDC_ISSUER_and_OIDC_AUDIENCE_not_KEYCLOAK_ISSUER
      - API_token_verification_must_use_provider_neutral_discovery_or_metadata_not_a_hardcoded_keycloak_jwks_path
      - browser_oidc_config_must_use_discovery_backed_metadata_and_must_not_hardcode_protocol_openid_connect_paths
    machine_verification:
      commands:
        - pnpm --filter @starter/services-api build
        - pnpm --filter @starter/services-api test
        - pnpm --filter @starter/web build
        - pnpm --filter @starter/web test
        - rg -n "KEYCLOAK_ISSUER|protocol/openid-connect" packages/services/api packages/web
      expected_artifacts:
        - packages/services/api/src/auth.ts
        - packages/web/src/auth/OidcAuthProvider.ts
      expected_results:
        - services_api_build_exit_code_0
        - services_api_test_exit_code_0
        - web_build_exit_code_0
        - web_test_exit_code_0
        - rg_exit_code_1_no_provider_specific_leftovers
    human_verification: []
    done_when:
      - auth_defaults_fail_closed
      - provider_specific_keycloak_paths_are_removed_from_runtime_code
      - browser_and_api_can_be_configured_from_oidc_metadata

  - id: idm-02-separate_identity_from_application_authorization
    goal: make_app_db_entitlements_and_game_membership_the_only_authorization_sources
    delivers:
      - deliverable-02-application_entitlements_and_authorization
    prerequisites:
      - idm-01-make_auth_configuration_fail_closed_and_provider_neutral
    implementation_requirements:
      - PlayerProfile_must_contain_identity_metadata_only
      - a_PlatformEntitlement_item_or_equivalent_repository_must_exist_for_global_app_roles
      - GameMember_must_remain_the_source_of_truth_for_per_game_gm_authorization
      - admin_and_gm_route_authorization_must_load_from_app_data_not_raw_jwt_roles
      - syncMyProfile_must_persist_identity_attributes_only_and_must_not_persist_token_derived_roles
      - authorization_tests_must_cover_denial_when_token_roles_are_present_but_app_entitlements_are_absent
    machine_verification:
      commands:
        - pnpm --filter @starter/services-shared test
        - pnpm --filter @starter/services-api test
        - rg -n "roles: identity.roles|realm_access|resource_access" packages/services/api/src packages/services/shared/src
      expected_artifacts:
        - packages/services/shared/src/authorization.ts
        - packages/services/shared/src/db.ts
        - packages/services/api/src/httpRoutes.ts
      expected_results:
        - services_shared_test_exit_code_0
        - services_api_test_exit_code_0
        - rg_exit_code_1_no_raw_token_role_trust
    human_verification: []
    done_when:
      - ADMIN_requires_platform_entitlement_record
      - GM_requires_game_membership_or_character_ownership_rules
      - token_roles_alone_cannot_unlock_privileged_routes

  - id: idm-03-align_local_oidc_with_production_authorization_boundaries
    goal: keep_local_oidc_useful_without_letting_keycloak_act_as_the_app_authorization_source
    delivers:
      - deliverable-03-local_oidc_parity_and_seed_data
    prerequisites:
      - idm-02-separate_identity_from_application_authorization
    implementation_requirements:
      - keycloak_realm_must_not_define_or_assign_authoritative_GM_or_ADMIN_app_roles
      - local_seed_data_must_create_PlatformEntitlement_records_and_GameMember_records_needed_for_player_gm_and_admin_test_flows
      - local_e2e_and_manual_testing_must_still_support_player_gm_and_admin_scenarios
      - local_scripts_must_preserve_current_make_dev_up_and_make_e2e_ergonomics
    machine_verification:
      commands:
        - pnpm --filter @starter/test-e2e build
        - pnpm --filter @starter/test-e2e test
        - rg -n "\"realmRoles\"|\"name\": \"GM\"|\"name\": \"ADMIN\"" keycloak/realm-swordworld.json
      expected_artifacts:
        - keycloak/realm-swordworld.json
        - scripts/local/seed.sh
      expected_results:
        - test_e2e_build_exit_code_0
        - test_e2e_test_exit_code_0
        - rg_exit_code_1_no_authoritative_app_roles_in_keycloak
    human_verification: []
    done_when:
      - local_keycloak_behaves_as_authentication_only
      - local_player_gm_and_admin_paths_are_backed_by_app_data

  - id: idm-04-harden_browser_session_handling
    goal: remove_production_insecure_token_persistence_from_the_browser_auth_implementation
    delivers:
      - deliverable-01-auth_contract_and_fail_closed_config
    prerequisites:
      - idm-01-make_auth_configuration_fail_closed_and_provider_neutral
    implementation_requirements:
      - browser_auth_must_not_persist_access_tokens_in_localStorage
      - session_state_may_use_sessionStorage_for_transient_pkce_state_only
      - auth_tests_must_cover_token_expiry_login_callback_and_logout_behavior
      - callback_sync_must_not_elevate_authorization_from_idp_claims
    machine_verification:
      commands:
        - pnpm --filter @starter/web test
        - rg -n "localStorage" packages/web/src/auth/OidcAuthProvider.ts packages/web/src/pages/AuthCallbackPage.tsx
      expected_artifacts:
        - packages/web/src/auth/OidcAuthProvider.ts
      expected_results:
        - web_test_exit_code_0
        - rg_exit_code_1_no_localStorage_token_usage
    human_verification: []
    done_when:
      - browser_auth_does_not_store_bearer_tokens_in_localStorage
      - browser_auth_is_safe_to_front_with_cloudfront_and_s3

  - id: idm-05-add_aws_runtime_adapters_and_remove_static_aws_credentials
    goal: make_api_and_dispatcher_deployable_to_lambda_with_correct_aws_identity_handling
    delivers:
      - deliverable-04-aws_runtime_adapters_and_client_hardening
    prerequisites:
      - idm-01-make_auth_configuration_fail_closed_and_provider_neutral
    implementation_requirements:
      - add_packages_services_api_src_lambda_ts_that_reuses_the_existing_route_dispatch_layer
      - add_packages_services_dispatcher_src_lambda_ts_that_reuses_the_existing_dispatcher_core
      - aws_client_factories_must_only_inject_endpoints_and_test_credentials_in_local_mode
      - aws_runtimes_must_rely_on_the_default_aws_credential_provider_chain
      - local_server_ts_and_worker_ts_must_remain_supported
    machine_verification:
      commands:
        - pnpm --filter @starter/services-api build
        - pnpm --filter @starter/services-api test
        - pnpm --filter @starter/services-dispatcher build
        - pnpm --filter @starter/services-dispatcher test
        - rg -n "accessKeyId: env\\('AWS_ACCESS_KEY_ID', 'test'\\)|secretAccessKey: env\\('AWS_SECRET_ACCESS_KEY', 'test'\\)" packages/services/api/src/awsClients.ts packages/services/dispatcher/src/awsClients.ts
      expected_artifacts:
        - packages/services/api/src/lambda.ts
        - packages/services/dispatcher/src/lambda.ts
      expected_results:
        - services_api_build_exit_code_0
        - services_api_test_exit_code_0
        - services_dispatcher_build_exit_code_0
        - services_dispatcher_test_exit_code_0
        - rg_exit_code_1_no_static_test_credentials_in_aws_clients
    human_verification: []
    done_when:
