doc_type: llm_instruction
name: everything-local.environment
version: 1
goal:
  - Create an "everything local" development + testing environment for the Character Creation vertical slice.
  - Must support: API -> SQS FIFO -> Dispatcher -> DynamoDB, plus auth via local OIDC or dev JWT.
  - Must run on a single developer machine with Docker and Node.js.
  - Must provide deterministic e2e testing using fixtures/vertical-slice.character-creation.fixtures.yaml.

assumptions:
  runtime:
    node: ">=20"
    package_manager: "pnpm (preferred) or npm"
    docker: "docker + docker compose v2"
  repo_layout_expected:
    - "docs/vertical-slice.character-creation.async-layer.yaml"
    - "docs/vertical-slice.character-creation.db-schema.yaml"
    - "docs/vertical-slice.character-creation.engine.yaml"
    - "fixtures/vertical-slice.character-creation.fixtures.yaml"
    - "packages/services/api (or equivalent)"
    - "packages/services/dispatcher (or equivalent)"
    - "packages/engine (or equivalent)"
  aws_sdks:
    - "AWS SDK v3 for JS/TS"
  auth_modes_supported:
    - local_oidc_keycloak
    - dev_jwt_bypass

deliverables:
  files_to_create_or_update:
    - path: "docker-compose.local.yml"
      purpose: "Run LocalStack(SQS), DynamoDB Local, Keycloak, Postgres for Keycloak."
    - path: ".env.local"
      purpose: "Canonical local environment variables for services and tests."
    - path: "scripts/local/create-resources.sh"
      purpose: "Create DynamoDB tables + SQS FIFO/DLQ in local endpoints."
    - path: "scripts/local/seed.sh"
      purpose: "Seed a dev game record + optional GM role + test users."
    - path: "scripts/local/run-api.sh"
      purpose: "Run API locally with correct env."
    - path: "scripts/local/run-dispatcher.sh"
      purpose: "Run dispatcher locally with correct env."
    - path: "scripts/local/e2e.sh"
      purpose: "Run fixture-driven e2e test against local stack."
    - path: "Makefile"
      purpose: "One-command workflows: up/down/reset/test."
    - path: "packages/shared/src/auth/localOidc.ts"
      purpose: "JWT verification against local Keycloak issuer (JWKS)."
    - path: "packages/shared/src/auth/devAuth.ts"
      purpose: "Dev auth mode that injects actorId/sub without JWT."
    - path: "packages/services/api/src/auth.ts"
      purpose: "Switchable auth: OIDC vs dev."
    - path: "packages/services/api/src/awsClients.ts"
      purpose: "SDK clients that respect local endpoints."
    - path: "packages/services/dispatcher/src/awsClients.ts"
      purpose: "SDK clients that respect local endpoints."
    - path: "packages/test-e2e/src/runFixtureSequence.ts"
      purpose: "Reads fixtures YAML, posts commands, polls status, asserts outcomes."

  acceptance_criteria:
    - "docker compose up -d starts all local deps successfully"
    - "scripts/local/create-resources.sh creates GameState + CommandLog tables and commands.fifo + commands-dlq.fifo"
    - "API can accept POST /commands and write CommandLog=ACCEPTED locally"
    - "Dispatcher consumes SQS FIFO and updates CommandLog to PROCESSED locally"
    - "scripts/local/e2e.sh runs e2e.good.human_rune_master_sequence and passes"
    - "Works in both auth modes: local_oidc_keycloak AND dev_jwt_bypass"

implementation_plan:
  step_1_docker_compose:
    create_file:
      path: "docker-compose.local.yml"
      content: |
        services:
          localstack:
            image: localstack/localstack:3
            environment:
              - SERVICES=sqs
              - AWS_DEFAULT_REGION=us-east-1
              - DEBUG=0
            ports:
              - "4566:4566"
            volumes:
              - "./.localstack:/var/lib/localstack"
              - "/var/run/docker.sock:/var/run/docker.sock"

          dynamodb:
            image: amazon/dynamodb-local:latest
            command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
            ports:
              - "8000:8000"

          keycloak-db:
            image: postgres:16
            environment:
              - POSTGRES_DB=keycloak
              - POSTGRES_USER=keycloak
              - POSTGRES_PASSWORD=keycloak
            ports:
              - "5432:5432"
            volumes:
              - "./.keycloak-db:/var/lib/postgresql/data"

          keycloak:
            image: quay.io/keycloak/keycloak:25.0
            command: ["start-dev"]
            environment:
              - KC_DB=postgres
              - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
              - KC_DB_USERNAME=keycloak
              - KC_DB_PASSWORD=keycloak
              - KEYCLOAK_ADMIN=admin
              - KEYCLOAK_ADMIN_PASSWORD=admin
              - KC_HTTP_PORT=8080
              - KC_HOSTNAME_STRICT=false
              - KC_PROXY=edge
            ports:
              - "8080:8080"
            depends_on:
              - keycloak-db

  step_2_env_file:
    create_file:
      path: ".env.local"
      content: |
        # Local endpoints
        AWS_REGION=us-east-1
        AWS_ACCESS_KEY_ID=test
        AWS_SECRET_ACCESS_KEY=test
        DDB_ENDPOINT=http://localhost:8000
        SQS_ENDPOINT=http://localhost:4566

        # Tables/queues
        GAMESTATE_TABLE=GameState
        COMMANDLOG_TABLE=CommandLog
        COMMANDS_QUEUE_NAME=commands.fifo
        COMMANDS_DLQ_NAME=commands-dlq.fifo

        # API
        API_PORT=3000

        # Auth mode:
        #   AUTH_MODE=dev  => no JWT required, uses DEV_ACTOR_ID
        #   AUTH_MODE=oidc => verifies JWT against KEYCLOAK_ISSUER
        AUTH_MODE=dev
        DEV_ACTOR_ID=player-aaa

        # Keycloak OIDC (AUTH_MODE=oidc)
        KEYCLOAK_ISSUER=http://localhost:8080/realms/swordworld
        OIDC_AUDIENCE=swordworld-web
        OIDC_JWKS_CACHE_SECONDS=300

        # Fixtures
        FIXTURES_PATH=fixtures/vertical-slice.character-creation.fixtures.yaml

  step_3_local_resource_creation:
    create_file:
      path: "scripts/local/create-resources.sh"
      executable: true
      content: |
        #!/usr/bin/env bash
        set -euo pipefail

        source .env.local

        aws_ddb() { aws --region "$AWS_REGION" --endpoint-url "$DDB_ENDPOINT" dynamodb "$@"; }
        aws_sqs() { aws --region "$AWS_REGION" --endpoint-url "$SQS_ENDPOINT" sqs "$@"; }

        echo "== DynamoDB tables =="
        aws_ddb create-table \
          --table-name "$GAMESTATE_TABLE" \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true

        aws_ddb create-table \
          --table-name "$COMMANDLOG_TABLE" \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true

        echo "== SQS queues (FIFO + DLQ) =="
        aws_sqs create-queue \
          --queue-name "$COMMANDS_DLQ_NAME" \
          --attributes FifoQueue=true,ContentBasedDeduplication=false 2>/dev/null || true

        DLQ_URL=$(aws_sqs get-queue-url --queue-name "$COMMANDS_DLQ_NAME" --query QueueUrl --output text)
        DLQ_ARN=$(aws_sqs get-queue-attributes --queue-url "$DLQ_URL" --attribute-names QueueArn --query Attributes.QueueArn --output text)

        aws_sqs create-queue \
          --queue-name "$COMMANDS_QUEUE_NAME" \
          --attributes "FifoQueue=true,ContentBasedDeduplication=false,RedrivePolicy={\"deadLetterTargetArn\":\"$DLQ_ARN\",\"maxReceiveCount\":\"5\"}" 2>/dev/null || true

        QUEUE_URL=$(aws_sqs get-queue-url --queue-name "$COMMANDS_QUEUE_NAME" --query QueueUrl --output text)
        echo "COMMANDS_QUEUE_URL=$QUEUE_URL" > .env.local.queueurl
        echo "Queue URL: $QUEUE_URL"

  step_4_seed_data:
    create_file:
      path: "scripts/local/seed.sh"
      executable: true
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        source .env.local

        aws_ddb() { aws --region "$AWS_REGION" --endpoint-url "$DDB_ENDPOINT" dynamodb "$@"; }

        now="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

        # Seed a game and a GM. Adjust IDs to match your app’s expectations.
        aws_ddb put-item --table-name "$GAMESTATE_TABLE" --item "{
          \"pk\": {\"S\":\"GAME#game-1\"},
          \"sk\": {\"S\":\"METADATA\"},
          \"gameId\": {\"S\":\"game-1\"},
          \"gmPlayerId\": {\"S\":\"gm-zzz\"},
          \"createdAt\": {\"S\":\"$now\"},
          \"updatedAt\": {\"S\":\"$now\"},
          \"version\": {\"N\":\"1\"}
        }"

        aws_ddb put-item --table-name "$GAMESTATE_TABLE" --item "{
          \"pk\": {\"S\":\"PLAYER#player-aaa\"},
          \"sk\": {\"S\":\"PROFILE\"},
          \"playerId\": {\"S\":\"player-aaa\"},
          \"displayName\": {\"S\":\"Local Player\"},
          \"roles\": {\"L\":[{\"S\":\"PLAYER\"}]},
          \"createdAt\": {\"S\":\"$now\"},
          \"updatedAt\": {\"S\":\"$now\"}
        }"

        aws_ddb put-item --table-name "$GAMESTATE_TABLE" --item "{
          \"pk\": {\"S\":\"PLAYER#gm-zzz\"},
          \"sk\": {\"S\":\"PROFILE\"},
          \"playerId\": {\"S\":\"gm-zzz\"},
          \"displayName\": {\"S\":\"Local GM\"},
          \"roles\": {\"L\":[{\"S\":\"PLAYER\"},{\"S\":\"GM\"}]},
          \"createdAt\": {\"S\":\"$now\"},
          \"updatedAt\": {\"S\":\"$now\"}
        }"

        echo "Seeded game-1, player-aaa, gm-zzz"

  step_5_keycloak_realm_setup_optional:
    notes:
      - "This step is optional if AUTH_MODE=dev."
      - "If using OIDC locally, create realm 'swordworld' and client 'swordworld-web' in Keycloak."
    instructions_for_llm:
      - "Use Keycloak admin credentials admin/admin on http://localhost:8080"
      - "Create realm 'swordworld'"
      - "Create client 'swordworld-web' with standard flow enabled, PKCE required"
      - "Set Valid Redirect URIs: http://localhost:3000/* (or FE port)"
      - "Create users: player@example.com and gm@example.com, set passwords, assign GM role via app data (not Keycloak roles unless you already implemented role mapping)"

  step_6_sdk_endpoint_wiring:
    requirement:
      - "All AWS SDK clients must use local endpoints when DDB_ENDPOINT/SQS_ENDPOINT are set."
    code_changes:
      - "In services/api/awsClients.ts create DynamoDBClient({ endpoint: process.env.DDB_ENDPOINT }) and SQSClient({ endpoint: process.env.SQS_ENDPOINT })"
      - "Same in dispatcher/awsClients.ts"
      - "Do not hardcode endpoints; default to AWS when env vars absent."

  step_7_auth_switch:
    requirement:
      - "API must support AUTH_MODE=dev and AUTH_MODE=oidc."
    dev_mode_behavior:
      - "Accept requests without Authorization header."
      - "Inject actorId = DEV_ACTOR_ID"
    oidc_mode_behavior:
      - "Require Authorization: Bearer <jwt>"
      - "Verify JWT signature via JWKS from KEYCLOAK_ISSUER"
      - "Set actorId = jwt.sub"
      - "Validate audience if OIDC_AUDIENCE provided"

  step_8_run_scripts:
    create_files:
      - path: "scripts/local/run-api.sh"
        executable: true
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          source .env.local
          source .env.local.queueurl || true
          export COMMANDS_QUEUE_URL="${COMMANDS_QUEUE_URL:-}"
          export PORT="${API_PORT}"
          pnpm --filter @app/api dev
      - path: "scripts/local/run-dispatcher.sh"
        executable: true
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          source .env.local
          source .env.local.queueurl || true
          export COMMANDS_QUEUE_URL="${COMMANDS_QUEUE_URL:-}"
          pnpm --filter @app/dispatcher dev

  step_9_e2e_runner:
    requirement:
      - "Must execute command_sequences_for_integration.e2e.good.human_rune_master_sequence from fixtures YAML."
    behavior:
      - "Load fixtures YAML"
      - "Select sequence by id"
      - "For each command: assign fresh commandId UUID, POST /commands"
      - "Poll GET /commands/{commandId} until PROCESSED|FAILED"
      - "At end: query character + inbox endpoints and assert expected results"
    create_file:
      path: "scripts/local/e2e.sh"
      executable: true
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        source .env.local
        node packages/test-e2e/dist/runFixtureSequence.js e2e.good.human_rune_master_sequence

  step_10_makefile:
    create_file:
      path: "Makefile"
      content: |
        .PHONY: up down reset resources seed api dispatcher e2e logs

        up:
        	docker compose -f docker-compose.local.yml up -d

        down:
        	docker compose -f docker-compose.local.yml down

        reset: down
        	rm -rf .localstack .keycloak-db
        	docker compose -f docker-compose.local.yml up -d

        resources:
        	bash scripts/local/create-resources.sh

        seed:
        	bash scripts/local/seed.sh

        api:
        	bash scripts/local/run-api.sh

        dispatcher:
        	bash scripts/local/run-dispatcher.sh

        e2e:
        	bash scripts/local/e2e.sh

        logs:
        	docker compose -f docker-compose.local.yml logs -f --tail=200

local_runbook:
  one_time_setup:
    - "make up"
    - "make resources"
    - "make seed"
    - "pnpm install"
    - "pnpm build"
  dev_loop_two_terminals:
    terminal_1:
      - "make api"
    terminal_2:
      - "make dispatcher"
  test:
    - "make e2e"

notes:
  pragmatism_guidance:
    - "Keep AUTH_MODE=dev for fast iteration; switch to AUTH_MODE=oidc weekly or before release cuts."
    - "Do not attempt to emulate Cognito locally; just emulate OIDC."
    - "If you already have Cognito-specific claims logic, keep it behind an interface and provide a Keycloak-compatible mapping."
